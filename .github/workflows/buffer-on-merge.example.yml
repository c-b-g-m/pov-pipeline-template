# ─── Buffer on Merge ────────────────────────────────────────────────────────
#
# Copy this workflow into YOUR SITE REPO at .github/workflows/buffer-on-merge.yml
# It runs when a POV content PR is merged and sends the edited social draft
# to Buffer — so only reviewed content reaches LinkedIn (or other platforms).
#
# Why post-merge instead of in the pipeline?
# The pipeline drafts content via Claude, but you'll often edit it before merging.
# Posting from the pipeline would send the unedited AI draft. This workflow reads
# the Social Draft block from the merged PR's body — the version you actually
# approved and edited in the PR description.
#
# Required secrets (in your SITE repo's Settings > Secrets):
#   BUFFER_ACCESS_TOKEN      — Buffer API token (get one at https://buffer.com/developers)
#   BUFFER_ORGANIZATION_ID   — Your Buffer organization ID
#
# Optional:
#   BUFFER_SERVICE            — Social platform (default: "linkedin")
# ────────────────────────────────────────────────────────────────────────────

name: Buffer on Merge

on:
  push:
    branches: [main]
    paths:
      # Adjust this path to match your site's content directory
      - 'src/content/pov/**'

jobs:
  post-to-buffer:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2    # Need HEAD~1 to diff

      - name: Check for merged POV files
        id: find-files
        run: |
          # Adjust the path pattern to match your content directory
          FILES=$(git diff --name-only --diff-filter=A HEAD~1..HEAD -- 'src/content/pov/*.mdx' 'src/content/pov/*.md')
          if [ -z "$FILES" ]; then
            echo "No new POV files in this push"
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found files: $FILES"
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Get merged PR body
        id: get-pr
        if: steps.find-files.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the PR that was just merged by its merge commit SHA
          PR_BODY=$(gh pr list \
            --state merged \
            --base main \
            --search "${{ github.sha }}" \
            --json body \
            --jq '.[0].body' 2>/dev/null || echo "")

          if [ -z "$PR_BODY" ]; then
            # Fallback: get the most recently merged PR
            PR_BODY=$(gh pr list \
              --state merged \
              --base main \
              --limit 1 \
              --json body \
              --jq '.[0].body')
          fi

          if [ -z "$PR_BODY" ]; then
            echo "Could not retrieve PR body"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Write PR body to a temp file to avoid shell escaping issues
          echo "$PR_BODY" > /tmp/pr_body.txt
          echo "found=true" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.get-pr.outputs.found == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # No additional packages needed — stdlib only

      - name: Send to Buffer
        if: steps.get-pr.outputs.found == 'true'
        env:
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_ORGANIZATION_ID: ${{ secrets.BUFFER_ORGANIZATION_ID }}
          BUFFER_SERVICE: ${{ vars.BUFFER_SERVICE || 'linkedin' }}
        run: |
          python3 << 'SCRIPT'
          import json
          import os
          import re
          from urllib.request import Request, urlopen

          BUFFER_API = "https://api.buffer.com"
          TOKEN = os.environ["BUFFER_ACCESS_TOKEN"]
          ORG_ID = os.environ["BUFFER_ORGANIZATION_ID"]
          SERVICE = os.environ.get("BUFFER_SERVICE", "linkedin")

          def graphql(query, variables=None):
              payload = {"query": query}
              if variables:
                  payload["variables"] = variables
              body = json.dumps(payload).encode()
              req = Request(
                  BUFFER_API,
                  data=body,
                  headers={
                      "Content-Type": "application/json",
                      "Authorization": f"Bearer {TOKEN}",
                      "User-Agent": "pov-pipeline-buffer-on-merge/1.0",
                  },
                  method="POST",
              )
              with urlopen(req, timeout=15) as resp:
                  return json.loads(resp.read().decode())

          # Read PR body written by the previous step
          with open("/tmp/pr_body.txt") as f:
              pr_body = f.read()

          # Extract the Social Draft block — the text between the ``` fences
          # under the "### Social Draft" heading
          match = re.search(
              r'###\s*Social Draft\s*\n```[^\n]*\n(.*?)\n```',
              pr_body,
              re.DOTALL,
          )
          if not match:
              print("No Social Draft block found in PR body — skipping")
              exit(0)

          draft_text = match.group(1).strip()
          if not draft_text:
              print("Social Draft block is empty — skipping")
              exit(0)

          print(f"Extracted draft ({len(draft_text)} chars)")

          # Get channel ID
          result = graphql("""
              query GetChannels($input: ChannelsInput!) {
                  channels(input: $input) { id name service isDisconnected }
              }
          """, {"input": {"organizationId": ORG_ID}})

          channels = result.get("data", {}).get("channels", [])
          channel_id = None
          for ch in channels:
              if ch.get("service", "").lower() == SERVICE and not ch.get("isDisconnected"):
                  channel_id = ch["id"]
                  break

          if not channel_id:
              print(f"No connected {SERVICE} channel found — skipping")
              exit(0)

          print(f"Using {SERVICE} channel: {channel_id}")

          result = graphql("""
              mutation CreatePost($input: CreatePostInput!) {
                  createPost(input: $input) {
                      ... on PostActionSuccess {
                          post { id text }
                      }
                      ... on MutationError { message }
                  }
              }
          """, {
              "input": {
                  "text": draft_text,
                  "channelId": channel_id,
                  "schedulingType": "automatic",
                  "mode": "addToQueue",
                  "saveToDraft": True,
              }
          })

          data = result.get("data", {}).get("createPost", {})
          if "post" in data:
              print(f"Buffer draft created (ID: {data['post']['id']})")
          else:
              error = data.get("message", result.get("errors", "Unknown error"))
              print(f"Buffer error: {error}")
              exit(1)

          SCRIPT
