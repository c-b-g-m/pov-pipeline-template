# ─── POV Pipeline Configuration ─────────────────────────────────────────────
#
# This is a complete working example using a fictional persona.
# Copy this file to config.yaml and replace with your own values.
#
# The pipeline reads this file at startup. It contains everything that makes
# the pipeline yours: your identity, your industry, your editorial themes,
# and your publishing setup.
# ─────────────────────────────────────────────────────────────────────────────

# ─── Identity ───────────────────────────────────────────────────────────────
# Who you are and what you write about.

author:
  name: "Jordan Rivera"
  role: "fractional product marketing consultant"
  specialization: "climate tech and clean energy"

site:
  name: "Jordan Rivera"                  # Display name used in page titles, nav, and footer.
  domain: "jordanrivera.dev"
  content_path: "src/content/pov"       # Path within your site repo where content files go.
                                        # This directory MUST exist in the target site repo
                                        # before you run the pipeline.
  url_pattern: "/pov/{slug}/"           # How URLs are formed on your site

  # OG image — site-relative path or absolute URL. You must provide this file.
  # Delete this line to use the default: /og-images/og-pov-default.png
  og_image: "/og-images/og-pov-default.png"

  # CTA block rendered below each article (HTML output only).
  # Delete this entire block to suppress the section.
  cta:
    heading: "Want to build this for your team?"
    body: "Your custom call-to-action copy goes here."
    link_url: "https://yoursite.com/contact"
    link_text: "Get in touch"

# ─── Audience ───────────────────────────────────────────────────────────────
# Who you're writing FOR. One audience per pipeline — the model calibrates
# vocabulary, assumed knowledge, and framing against this single reader.
#
# Need to write for two different audiences? Run two copies of this repo,
# each with its own config.yaml and voice-guidelines.md. Don't try to encode
# multiple audiences here — the model will average them and the takes lose
# their edge. See README for running multiple pipelines.
#
# All three fields are optional but strongly recommended. Leave the whole
# block out if you want the model to default to a generic industry reader.

audience:
  description: "Climate tech operators, early-stage founders, and the investors who fund them"
  knows_already: "Industry basics, common acronyms, the major players and dominant narratives"
  cares_about: "What's actually working in the field, where capital is flowing, what to ignore"

# ─── First Principles ──────────────────────────────────────────────────────
# Your foundational beliefs — things you hold as settled, not open to debate
# in your content. The model reads these as premises to reason FROM, not
# just things to avoid contradicting.
#
# Each principle needs a `belief` string. Optionally attach a `post_url` +
# `post_title` pointing to a post where you've explained the belief in depth.
# The model will only link to these posts when a principle is the crux of
# the argument — not every time it's referenced. Max one link per take.
#
# Leave the whole block out if you don't want to use this feature. These
# are YOUR beliefs, not a debate club — the model will not hedge on them.

first_principles:
  - belief: "Carbon markets are broken until MRV is solved at scale."
    post_url: "https://jordanrivera.dev/pov/carbon-markets-mrv/"
    post_title: "The MRV problem nobody wants to talk about"
  - belief: "Grid software is systematically undervalued relative to grid hardware."
    post_url: "https://jordanrivera.dev/pov/grid-software-undervalued/"
    post_title: "The unsexy thesis I keep coming back to"
  - belief: "Electrification is inevitable — the debate is speed and value capture, not whether it happens."
    # No post_url yet — still a working premise, just not written up.

# ─── Discovery ──────────────────────────────────────────────────────────────
# Where the pipeline looks for articles to react to.

discovery:
  max_article_age_hours: 72             # Ignore articles older than this
  max_candidates: 5                     # Max articles to process per run

  # RSS feeds to scan.
  #
  # needs_keyword_filter: true  — filter broad feeds (PR wires, aggregators) by
  #                               industry_keywords before adding to candidates.
  # priority: 1                 — rank order when multiple feeds compete for the
  #                               max_candidates slots. Lower = higher priority.
  #                               Defaults to 1 if omitted.
  # max_per_feed: 3             — cap how many articles this feed can contribute
  #                               per run. Omit for no cap.
  #
  # Note: Reddit blocks RSS scraping at the platform level. Do not add Reddit
  # feeds — they return empty results silently.
  rss_feeds:
    - url: "https://www.canarymedia.com/feed"
      needs_keyword_filter: false
      priority: 1
    - url: "https://techcrunch.com/category/climate/feed"
      needs_keyword_filter: false
      priority: 2
      max_per_feed: 3
    - url: "https://www.globenewswire.com/RssFeed/industry/Energy"
      needs_keyword_filter: true
      priority: 3

  # Brave Web Search queries.
  # REQUIRES: BRAVE_SEARCH_API_KEY environment variable + an active Brave Search
  # API subscription (paid tier for commercial use). Without the key, these
  # queries silently return zero results — the pipeline will warn you at startup.
  # Delete this section entirely if you don't have Brave set up.
  brave_queries:
    - '"carbon capture" OR "direct air capture" startup funding 2026'
    - '"grid storage" OR "battery technology" clean energy announcement'

  # Keywords for filtering broad feeds (like PR wires)
  industry_keywords:
    - "clean energy"
    - "carbon capture"
    - "grid storage"
    - "solar"
    - "wind power"
    - "EV charging"
    - "climate tech"
    - "green hydrogen"

  # Domains to always skip
  blocked_domains:
    - arxiv.org
    - ssrn.com
    - linkedin.com
    - facebook.com
    - twitter.com
    - x.com
    - youtube.com

# ─── Themes ─────────────────────────────────────────────────────────────────
# Your editorial themes. Each article gets tagged with one theme.
# Define as many or few as you want. Each needs a slug, label, and keywords.

themes:
  - slug: "grid-modernization"
    label: "Grid Modernization"
    description: "How utilities and startups are rethinking grid infrastructure"
    keywords:
      - "grid modernization"
      - "smart grid"
      - "grid storage"
      - "virtual power plant"
      - "distributed energy"

  - slug: "carbon-markets"
    label: "Carbon Markets"
    description: "Carbon credits, offsets, and the evolving compliance landscape"
    keywords:
      - "carbon credit"
      - "carbon offset"
      - "carbon market"
      - "emissions trading"

  - slug: "electrification"
    label: "Electrification"
    description: "The shift from fossil fuels to electric across transport, buildings, and industry"
    keywords:
      - "electrification"
      - "EV charging"
      - "heat pump"
      - "electric vehicle"

  - slug: "climate-finance"
    label: "Climate Finance"
    description: "How money flows into climate solutions -- VC, project finance, policy incentives"
    keywords:
      - "climate fund"
      - "green bond"
      - "IRA incentive"
      - "climate venture"

# ─── Drafting ───────────────────────────────────────────────────────────────
# How the AI drafts your content.

drafting:
  model: "claude-sonnet-4-6"            # Claude model to use
  max_tokens: 2000                      # Max tokens per draft
  output_format: "mdx"                  # "mdx", "markdown", or "html"
                                        # html: self-contained pages for static sites
                                        #       (requires site.name, site.domain,
                                        #        and /shared.css in your site repo)

  # Content structure: the h2 sections that make up each take.
  # Customize headings and instructions to match your editorial style.
  sections:
    - heading: "The news"
      instruction: "What happened. 2-3 sentences. No editorializing."
    - heading: "My take"
      instruction: "Your interpretation or challenge. 150-250 words."
    - heading: "The so-what"
      instruction: "What readers should do differently. 2-4 sentences."

  # Social draft settings
  social_draft:
    enabled: true
    platform: "linkedin"
    word_range: [150, 250]

# ─── Publishing ─────────────────────────────────────────────────────────────
# Where content PRs get created.

publishing:
  target_repo: "jordanrivera/jordanrivera-dev"   # GitHub owner/repo
  base_branch: "main"
  branch_prefix: "pov"                           # Branches: pov/2026-04-07-slug

# ─── Buffer (post-merge) ────────────────────────────────────────────────────
# Social posting via Buffer now happens AFTER you merge a PR, not during the
# pipeline run. This ensures only reviewed/edited content reaches LinkedIn.
#
# Setup: copy .github/workflows/buffer-on-merge.example.yml into your SITE
# repo at .github/workflows/buffer-on-merge.yml and add BUFFER_ACCESS_TOKEN
# and BUFFER_ORGANIZATION_ID as secrets in the site repo.
#
# The pipeline stores the social draft in each file's frontmatter
# (linkedInDraft field). The post-merge action reads it from the merged file.

# ─── Pipeline ───────────────────────────────────────────────────────────────
# General pipeline settings.

pipeline:
  timezone: "America/New_York"
  rate_limit_sleep: 2
  log_file: "pipeline.log"
